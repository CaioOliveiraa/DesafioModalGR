<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emprestimo ModalGR</title>
    <link rel="stylesheet" type="text/css" href="./style.css">
</head>

<body>
    <div class="container">
        <div>
            <img src="./assets/logo.jpg" alt="logo modalGR">
            <h1>Programa de Empréstimo ModalGR</h1>
            <label for="name">Nome:</label>
            <input type="text" id="name">
        </div>
        <div>
            <label for "admission-date">Data de Admissão:</label>
            <input type="text" id="admission-date">
        </div>
        <div>
            <label for="salary">Salário:</label>
            <input type="number" id="salary">
        </div>
        <div>
            <label for="loan-amount">Valor do Empréstimo:</label>
            <input type="number" id="loan-amount">
        </div>
        <div>
            <label for="withdrawal-method">Método de Saque:</label>
            <select id="withdrawal-method">
                <option value="greater">Maior valor</option>
                <option value="lesser">Menor valor</option>
                <option value="half">Metade e metade</option>
            </select>
        </div>
        <button id="calculate-loan">Calcular Empréstimo</button>
        <div id="error-message" class="hidden"></div>
        <div id="result" class="hidden">
            <div id="loan-options"></div>
        </div>
    </div>
    

    <script src="script.js"></script>

</body>

</html>
